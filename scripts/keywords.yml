dedup:
  similarity_threshold: 0.75   # 75% 이상 유사하면 중복
  title_match_ratio: 0.6       # 제목 60% 이상 겹치면 중복
  time_window_hours: 48        # 48시간 내 같은 키워드면 중복 후보
